  '/servers/{server}/network/allocations/{allocation}/primary':
    parameters:
      - $ref: '#/components/parameters/server'
      - schema:
          type: integer
        name: allocation
        in: path
        required: true
        description: The allocation ID.
    post:
      summary: Set Primary Allocation
      operationId: set-server-primary-allocation
      responses:
        '204':
          description: No Content
      description: Sets the given allocation as the default/primary for the server.
      tags:
        - Server Network

  '/servers/{server}/users':
    parameters:
      - $ref: '#/components/parameters/server'
    get:
      summary: List Subusers
      operationId: get-server-subusers
      description: Returns all subusers for a server.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        object:
                          type: string
                        attributes:
                          $ref: '#/components/schemas/subuser'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
      tags:
        - Server Users
    post:
      summary: Create Subuser
      operationId: create-server-subuser
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                  attributes:
                    $ref: '#/components/schemas/subuser'
      description: Creates a new subuser for the server.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: The email address of the user to add.
                permissions:
                  type: array
                  items:
                    type: string
              required:
                - email
                - permissions
      tags:
        - Server Users

  '/servers/{server}/users/{user}':
    parameters:
      - $ref: '#/components/parameters/server'
      - schema:
          type: integer
        name: user
        in: path
        required: true
        description: The subuser ID.
    get:
      summary: Get Subuser
      operationId: get-server-subuser
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                  attributes:
                    $ref: '#/components/schemas/subuser'
      description: Returns a single subuser with their permissions.
      tags:
        - Server Users
    post:
      summary: Update Subuser
      operationId: update-server-subuser
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                  attributes:
                    $ref: '#/components/schemas/subuser'
      description: Updates the permissions for a subuser.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                permissions:
                  type: array
                  items:
                    type: string
              required:
                - permissions
      tags:
        - Server Users
    delete:
      summary: Delete Subuser
      operationId: delete-server-subuser
      responses:
        '204':
          description: No Content
      description: Removes a subuser from the server.
      tags:
        - Server Users

components:
  schemas:
    server:
      type: object
      properties:
        server_owner:
          type: boolean
        tenant_id:
          type:
            - integer
            - 'null'
        tenant:
          type:
            - object
            - 'null'
          properties:
            id:
              type: integer
            uuid:
              type: string
            name:
              type: string
            description:
              type:
                - string
                - 'null'
        identifier:
          type: string
          description: The server short UUID or the new-style identifier.
        __deprecated_uuid_short:
          type: string
          description: The original uuid_short value, kept for backwards compatibility.
        server_identifier:
          type: string
          description: The new-style server identifier (format: serv_XXXXXXXX).
        internal_id:
          type: integer
        uuid:
          type: string
          format: uuid
        name:
          type: string
        node:
          type: string
        is_node_under_maintenance:
          type: boolean
        sftp_details:
          type: object
          properties:
            ip:
              type: string
            port:
              type: number
        connection:
          type:
            - string
            - 'null'
          description: >-
            The connection string in shortUuid.lo:port format, or null if the
            egg has no default port.
        aliases:
          type: array
          items:
            type: string
          description: Network aliases for the server container.
        description:
          type: string
        limits:
          type: object
          properties:
            memory:
              type: integer
            swap:
              type: integer
            disk:
              type: integer
            io:
              type: integer
            cpu:
              type: integer
            threads:
              type:
                - string
                - 'null'
            oom_disabled:
              type: boolean
        invocation:
          type: string
        docker_image:
          type: string
        egg_features:
          type:
            - array
            - 'null'
          items:
            type: string
        feature_limits:
          type: object
          properties:
            databases:
              type:
                - integer
                - 'null'
            allocations:
              type:
                - integer
                - 'null'
            backups:
              type:
                - integer
                - 'null'
        status:
          type:
            - string
            - 'null'
          enum:
            - installing
            - suspended
            - install_failed
            - restoring_backup
            - transferring
            - null
        is_suspended:
          type: boolean
          description: Deprecated, use `status` instead.
        is_installing:
          type: boolean
          description: Deprecated, use `status` instead.
        is_transferring:
          type: boolean
        relationships:
          type: object
          description: >-
            Relationships are generally only included when requested using the
            `include` parameter on a request.
          properties:
            allocations:
              type: object
              properties:
                object:
                  type: string
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      object:
                        type: string
                      attributes:
                        $ref: '#/components/schemas/allocation'
            variables:
              type: object
              properties:
                object:
                  type: string
                data:
                  type: array
                  uniqueItems: true
                  items:
                    type: object
                    properties:
                      object:
                        type: string
                      attributes:
                        $ref: '#/components/schemas/egg-variable'
            egg:
              type: object
              properties:
                object:
                  type: string
                attributes:
                  type: object
                  properties:
                    uuid:
                      type: string
                    name:
                      type: string
            subusers:
              type: object
              properties:
                object:
                  type: string
                data:
                  type: array
                  items:
                    type: object

    user:
      type: object
      properties:
        id:
          type: integer
        admin:
          type: boolean
        username:
          type: string
        email:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        language:
          type: string

    allocation:
      type: object
      properties:
        id:
          type: integer
        ip:
          type: string
        ip_alias:
          type:
            - string
            - 'null'
        port:
          type: integer
        notes:
          type:
            - string
            - 'null'
        is_default:
          type: boolean

    egg-variable:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        env_variable:
          type: string
        default_value:
          type: string
        server_value:
          type: string
        is_editable:
          type: boolean
        rules:
          type: string

    api-key:
      type: object
      properties:
        identifier:
          type: string
        description:
          type: string
        allowed_ips:
          type: array
          items:
            type: string
        last_used_at:
          type:
            - 'null'
            - string
          format: date-time
        created_at:
          type: string
          format: date-time

    server-database:
      type: object
      properties:
        id:
          type: string
        host:
          type: object
          properties:
            address:
              type: string
            port:
              type: integer
        name:
          type: string
        username:
          type: string
        connections_from:
          type: string
        max_connections:
          type: integer
        relationships:
          type: object
          properties:
            password:
              type: object
              properties:
                object:
                  type: string
                attributes:
                  type: object
                  properties:
                    password:
                      type: string

    file-object:
      type: object
      properties:
        name:
          type: string
        mode:
          type: string
        mode_bits:
          type: string
        size:
          type: integer
        is_file:
          type: boolean
        is_symlink:
          type: boolean
        mimetype:
          type: string
        created_at:
          type: string
          format: date-time
        modified_at:
          type: string
          format: date-time

    backup:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        is_successful:
          type: boolean
        is_locked:
          type: boolean
        name:
          type: string
        ignored_files:
          type: array
          items:
            type: string
        checksum:
          type:
            - string
            - 'null'
        bytes:
          type: integer
        created_at:
          type: string
          format: date-time
        completed_at:
          type:
            - string
            - 'null'
          format: date-time

    schedule:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        cron:
          type: object
          properties:
            day_of_week:
              type: string
            day_of_month:
              type: string
            month:
              type: string
            hour:
              type: string
            minute:
              type: string
        is_active:
          type: boolean
        is_processing:
          type: boolean
        only_when_online:
          type: boolean
        last_run_at:
          type:
            - string
            - 'null'
          format: date-time
        next_run_at:
          type:
            - string
            - 'null'
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        relationships:
          type: object
          properties:
            tasks:
              type: object
              properties:
                object:
                  type: string
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      object:
                        type: string
                      attributes:
                        $ref: '#/components/schemas/task'

    task:
      type: object
      properties:
        id:
          type: integer
        sequence_id:
          type: integer
        action:
          type: string
          enum:
            - command
            - power
            - backup
        payload:
          type: string
        time_offset:
          type: integer
        is_queued:
          type: boolean
        continue_on_failure:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    subuser:
      type: object
      properties:
        uuid:
          type: string
        identifier:
          type: string
        username:
          type: string
        email:
          type: string
        image:
          type: string
          format: uri
        '2fa_enabled':
          type: boolean
        created_at:
          type: string
          format: date-time
        permissions:
          type: array
          items:
            type: string

    stats:
      type: object
      properties:
        current_state:
          type: string
          enum:
            - offline
            - running
            - starting
            - stopping
        is_suspended:
          type: boolean
        resources:
          type: object
          properties:
            memory_bytes:
              type: integer
            cpu_absolute:
              type: number
            disk_bytes:
              type: integer
            network_rx_bytes:
              type: integer
            network_tx_bytes:
              type: integer
            uptime:
              type: integer

    activity-log:
      type: object
      properties:
        id:
          type: string
          description: SHA1 hash of the activity log ID.
        batch:
          type: string
        event:
          type: string
        is_api:
          type: boolean
        ip:
          type:
            - string
            - 'null'
          description: IP address if visible to the user, null otherwise.
        description:
          type:
            - string
            - 'null'
        properties:
          type: object
        has_additional_metadata:
          type: boolean
        timestamp:
          type: string
          format: date-time
        relationships:
          type: object
          properties:
            actor:
              type: object
              properties:
                object:
                  type: string
                attributes:
                  $ref: '#/components/schemas/user'

    error:
      type: object
      properties:
        code:
          type: string
          example: ValidationException
        status:
          type: string
          example: '422'
        detail:
          type: string
          example: The description field is required.
        meta:
          type:
            - object
            - 'null'
          properties:
            source_field:
              type: string
              example: description
            rule:
              type: string
              example: required
      required:
        - code
        - status
        - detail
      readOnly: true

    pagination:
      type: object
      properties:
        total:
          type: integer
          minimum: 0
        count:
          type: integer
          minimum: 0
        per_page:
          type: integer
          minimum: 1
        current_page:
          type: integer
          minimum: 1
        total_pages:
          type: integer
          minimum: 1
        links:
          type: object

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

  responses:
    '400':
      description: >-
        A `400: Bad Request` error response is generally returned when the
        request you're making cannot be processed, and is not due to an internal
        server error or validation issue.
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  $ref: '#/components/schemas/error'
    '401':
      description: >-
        A `401: Unauthorized` error response is returned when you fail to
        include proper authorization headers in your API request.
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  $ref: '#/components/schemas/error'
    '403':
      description: >-
        A `403: Forbidden` error response indicates that you lack permission to
        perform the given action.
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  $ref: '#/components/schemas/error'
    '405':
      description: >-
        A `405: Method Not Allowed` error response is returned if you make a
        request to an endpoint that exists but does not support the given HTTP
        verb.
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  $ref: '#/components/schemas/error'
    '422':
      description: >-
        A `422: Unprocessable Entity` error response is returned when the data
        provided to the endpoint failed to pass validation controls.
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  $ref: '#/components/schemas/error'

  parameters:
    server:
      name: server
      in: path
      required: true
      schema:
        type: string
      description: The server UUID or server identifier.
    api-key:
      name: identifier
      in: path
      required: true
      schema:
        type: string
      description: Api Key id
    include:
      name: include
      in: query
      required: false
      schema:
        type: string
      description: A comma delimited set of relationships to include
    page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 1
        minimum: 1
      description: Which page of items to request
    per_page:
      name: per_page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 50
      description: How many items can be included per page
    database:
      name: database
      in: path
      required: true
      schema:
        type: string
      description: The database to act on
    file:
      name: file
      in: query
      required: true
      schema:
        type: string
      description: The target file path.

  requestBodies: {}

security:
  - BearerAuth: []

tags:
  - name: Account
    description: Account Routes
  - name: Server
    description: Server Routes
  - name: Server Backups
    description: Server Backups Routes
  - name: Server Databases
    description: Server Databases Routes
  - name: Server Files
    description: Server Files Routes
  - name: Server Schedules
    description: Server Schedules Routes
  - name: Server Network
    description: Server Network Routes
  - name: Server Users
    description: Server Subuser Routes
