        - Server Schedules

  '/servers/{server}/schedules/{schedule}/tasks/{task}':
    parameters:
      - $ref: '#/components/parameters/server'
      - schema:
          type: integer
        name: schedule
        in: path
        required: true
        description: The schedule ID.
      - schema:
          type: integer
        name: task
        in: path
        required: true
        description: The task ID.
    post:
      summary: Update Task
      operationId: update-server-schedule-task
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                  attributes:
                    $ref: '#/components/schemas/task'
      description: Updates an existing schedule task.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum:
                    - command
                    - power
                    - backup
                payload:
                  type: string
                time_offset:
                  type: integer
                continue_on_failure:
                  type: boolean
                sequence_id:
                  type: integer
      tags:
        - Server Schedules
    delete:
      summary: Delete Task
      operationId: delete-server-schedule-task
      responses:
        '204':
          description: No Content
      description: Deletes a task from a schedule.
      tags:
        - Server Schedules

  '/servers/{server}/network/allocations':
    parameters:
