        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        object:
                          type: string
                        attributes:
                          $ref: '#/components/schemas/schedule'
                  meta:
                    type: object
                    properties:
                      pagination:
                        $ref: '#/components/schemas/pagination'
      tags:
        - Server Schedules
    post:
      summary: Create Schedule
      operationId: create-server-schedule
      description: Creates a new schedule for a server.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                  attributes:
                    $ref: '#/components/schemas/schedule'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 191
                cron:
                  type: object
                  properties:
                    day_of_week:
                      type: string
                    day_of_month:
                      type: string
                    month:
                      type: string
                    hour:
                      type: string
                    minute:
                      type: string
                  required:
                    - day_of_week
                    - day_of_month
                    - month
                    - hour
                    - minute
                is_active:
                  type: boolean
                only_when_online:
                  type: boolean
              required:
                - name
                - cron
      tags:
        - Server Schedules

  '/servers/{server}/schedules/{schedule}':
    parameters:
      - $ref: '#/components/parameters/server'
      - schema:
          type: integer
        name: schedule
        in: path
        required: true
        description: The schedule ID.
    get:
      summary: Get Schedule
      operationId: get-server-schedule
      description: Returns a single schedule with its tasks.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                  attributes:
                    $ref: '#/components/schemas/schedule'
      tags:
        - Server Schedules
    post:
      summary: Update Schedule
      operationId: update-server-schedule
      description: Updates an existing schedule.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                  attributes:
                    $ref: '#/components/schemas/schedule'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 191
                cron:
                  type: object
                  properties:
                    day_of_week:
                      type: string
                    day_of_month:
                      type: string
                    month:
                      type: string
                    hour:
                      type: string
                    minute:
                      type: string
                is_active:
                  type: boolean
                only_when_online:
                  type: boolean
      tags:
        - Server Schedules
    delete:
      summary: Delete Schedule
      operationId: delete-server-schedule
      responses:
        '204':
          description: No Content
      description: Deletes a schedule and its tasks.
      tags:
        - Server Schedules

  '/servers/{server}/schedules/{schedule}/execute':
    parameters:
      - $ref: '#/components/parameters/server'
      - schema:
          type: integer
        name: schedule
        in: path
        required: true
        description: The schedule ID.
    post:
      summary: Execute Schedule
      operationId: execute-server-schedule
      responses:
        '204':
          description: No Content
      description: Triggers immediate execution of a schedule.
      tags:
        - Server Schedules

  '/servers/{server}/schedules/{schedule}/tasks':
    parameters:
      - $ref: '#/components/parameters/server'
      - schema:
          type: integer
        name: schedule
        in: path
        required: true
        description: The schedule ID.
    post:
      summary: Create Task
      operationId: create-server-schedule-task
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                  attributes:
                    $ref: '#/components/schemas/task'
      description: Creates a new task for a schedule.
