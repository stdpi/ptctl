    post:
      summary: Update Allocation
      operationId: update-server-allocation
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                  attributes:
                    $ref: '#/components/schemas/allocation'
      description: Updates the notes for an allocation.
      requestBody:
        content:
          application/json:
            schema:
              type: object
